<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day_27</title>
    <link rel="stylesheet" href="style.css">

<body>

    <audio id="backgroundMusic" loop>
        <source src="Happy Birthday To You! (Traditional) First Time on YouTube.mp4" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="step active" id="step1">
        <div class="welcome-card">
            <h1>APRIL 27, 1995</h1>
            <button id="startButton" class="action-button">Click to Start!</button>
        </div>
    </div>

    <div class="step" id="step2">
        <div class="envelope-container" id="envelopeContainer">
            <div class="envelope">
                <div class="envelope-back"></div>
                <div class="envelope-front"></div>
                <div class="envelope-flap"></div>
                <div class="envelope-seal"></div>
            </div>
            <p class="click-instruction">Click the envelope!</p>
        </div>
    </div>

    <div class="step" id="step3">
        <div class="letter-container" id="letterContainer">
            <div class="letter">
                <p>
                    Happy Birthday, Ate Ling! 🎉<br>
                    Stay happy and blessed always✨🎈
                </p>
                <p>It’s celebration time!🥳</p>
                <button id="unfoldButton" class="action-button">Click the button!</button>
            </div>
        </div>
    </div>

    <div class="step" id="step4">
        <div class="celebration-container">
            <div class="fireworks-container"></div>
            <div class="confetti-cannon-container"></div>
            <div class="balloons-container"></div>

            <div class="celebration-card">
                <h1 class="main-greeting typewriter-text" id="finalGreeting">Happy Birthday,</h1>
                <h2 class="recipient-name">Lea M. Blanquisco!</h2>

                <div class="cake-container">
                    <div class="cake">
                        <div class="plate"></div>
                        <div class="layer layer-bottom"></div>
                        <div class="layer layer-middle"></div>
                        <div class="layer layer-top"></div>
                        <div class="icing"></div>
                        <div class="drip drip1"></div>
                        <div class="drip drip2"></div>
                        <div class="drip drip3"></div>

                        <div class="candle">
                            <div class="flame" id="candleFlame"></div>
                        </div>
                    </div>
